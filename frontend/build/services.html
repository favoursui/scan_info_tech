<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Services - Scan Info Tech</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen bg-[#f5efe6]">

  <div id="navbar"></div>

  <!-- Hero -->
  <section class="bg-[#3b2a1a] py-16 px-6 text-center">
    <p class="text-xs font-bold tracking-[0.3em] text-[#c17f24] uppercase mb-3">
      What We Offer
    </p>
    <h1 class="font-serif text-4xl md:text-5xl text-white mb-4">Our Services</h1>
    <p class="text-white/60 text-base max-w-xl mx-auto">
      Professional services tailored to your needs. Click any service to book.
    </p>
  </section>

  <!-- Services Grid -->
  <section class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-14">

    <!-- Loading -->
    <div id="services-loading" class="flex justify-center py-20">
      <div class="w-10 h-10 border-4 border-[#c17f24] border-t-transparent
                  rounded-full animate-spin"></div>
    </div>

    <!-- Empty -->
    <div id="services-empty" class="hidden text-center py-20">
      <p class="text-gray-400 text-lg">No services available yet.</p>
    </div>

    <!-- Grid -->
    <div id="services-grid"
      class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-5">
    </div>
  </section>

  <!-- Footer -->
  <footer class="bg-[#3b2a1a] text-white pt-16 pb-8 mt-8">
    <div class="max-w-7xl mx-auto px-6">
      <div class="border-t border-white/10 pt-8 flex flex-col sm:flex-row
                  items-center justify-between gap-3">
        <p class="text-white/30 text-sm">© 2025 Scan Info Tech. All rights reserved.</p>
        <p class="text-white/30 text-sm">Powered by secure e-commerce.</p>
      </div>
    </div>
  </footer>

  <!-- Booking Modal -->
  <div id="booking-modal"
    class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 hidden
           items-center justify-center px-4">
    <div class="bg-[#3b2a1a] border border-white/10 rounded-3xl shadow-2xl
                w-full max-w-lg p-8 relative">

      <!-- Close -->
      <button onclick="closeBookingModal()"
        class="absolute top-4 right-4 text-white/40 hover:text-white transition-colors">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>

      <p class="text-xs font-bold tracking-widest text-[#c17f24] uppercase mb-2">
        Book a Service
      </p>
      <h2 class="font-serif text-2xl text-white mb-1">
        <span id="modal-service-name">Service Name</span>
      </h2>
      <p class="text-white/40 text-sm mb-6">
        Fill in your details and we'll get back to you shortly.
      </p>

      <div id="booking-error"
        class="hidden bg-red-500/20 border border-red-400/30 text-red-200
               text-sm rounded-xl px-4 py-3 mb-4"></div>
      <div id="booking-success"
        class="hidden bg-green-500/20 border border-green-400/30 text-green-200
               text-sm rounded-xl px-4 py-3 mb-4"></div>

      <form id="booking-form" class="space-y-4">
        <input type="hidden" id="booking-service-name" />

        <div>
          <label class="block text-sm font-medium text-white/70 mb-1">
            Full Name <span class="text-red-400">*</span>
          </label>
          <input id="b-name" type="text" placeholder="John Doe" required
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3
                   text-white placeholder-white/30 text-sm focus:outline-none
                   focus:ring-2 focus:ring-[#c17f24] focus:border-transparent
                   backdrop-blur-sm transition-all" />
        </div>

        <div>
          <label class="block text-sm font-medium text-white/70 mb-1">
            Email Address <span class="text-red-400">*</span>
          </label>
          <input id="b-email" type="email" placeholder="john@example.com" required
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3
                   text-white placeholder-white/30 text-sm focus:outline-none
                   focus:ring-2 focus:ring-[#c17f24] focus:border-transparent
                   backdrop-blur-sm transition-all" />
        </div>

        <div>
          <label class="block text-sm font-medium text-white/70 mb-1">
            Phone Number
            <span class="text-white/30 font-normal">(optional)</span>
          </label>
          <input id="b-phone" type="tel" placeholder="+234 800 000 0000"
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3
                   text-white placeholder-white/30 text-sm focus:outline-none
                   focus:ring-2 focus:ring-[#c17f24] focus:border-transparent
                   backdrop-blur-sm transition-all" />
        </div>

        <div>
          <label class="block text-sm font-medium text-white/70 mb-1">
            Message
            <span class="text-white/30 font-normal">(optional)</span>
          </label>
          <textarea id="b-message" rows="3"
            placeholder="Tell us more about what you need..."
            class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3
                   text-white placeholder-white/30 text-sm focus:outline-none
                   focus:ring-2 focus:ring-[#c17f24] focus:border-transparent
                   backdrop-blur-sm transition-all resize-none"></textarea>
        </div>

        <button id="booking-btn" type="submit"
          class="w-full bg-[#c17f24] hover:bg-[#a66d1a] text-white font-semibold
                 py-4 rounded-xl transition-all duration-200 text-sm mt-2">
          Submit Booking
        </button>
      </form>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/nav.js"></script>
  <script src="js/services.js"></script>
</body>
</html>
