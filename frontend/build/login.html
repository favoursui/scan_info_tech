<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Scan Info Tech</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="min-h-screen flex">

  <!-- Left: Background Image -->
  <div class="hidden lg:block lg:w-1/2 relative">
    <img src="img/auth-bg.jpg" alt="Background"
      class="absolute inset-0 w-full h-full object-cover"
      onerror="this.style.background='#3b2a1a'">
    <div class="absolute inset-0 bg-black/50"></div>

    <div class="relative z-10 flex flex-col justify-between h-full p-12 text-white">
      <div class="flex items-center gap-3">
        <img src="img/logo.png" alt="Logo" class="w-10 h-10 rounded-full object-cover"
          onerror="this.style.display='none'">
        <span class="font-serif font-bold text-2xl">Scan Info Tech</span>
      </div>
      <div>
        <blockquote class="font-serif italic text-2xl leading-relaxed mb-4">
          "Welcome back. <br>Your next great find is waiting."
        </blockquote>
      </div>
    </div>
  </div>

  <!-- Right: Glassmorphism Form -->
  <div class="w-full lg:w-1/2 relative flex items-center justify-center px-6 py-12 bg-[#3b2a1a]">

    <div class="absolute inset-0 overflow-hidden">
      <div class="absolute -top-20 -right-20 w-80 h-80 bg-[#c17f24]/20 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-20 -left-20 w-80 h-80 bg-[#c17f24]/10 rounded-full blur-3xl"></div>
      <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-96 h-96 bg-white/5 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 w-full max-w-md">

      <!-- Mobile Logo -->
      <div class="flex lg:hidden items-center gap-3 mb-8">
        <img src="img/logo.png" alt="Logo" class="w-9 h-9 rounded-full object-cover"
          onerror="this.style.display='none'">
        <span class="font-serif font-bold text-xl text-white">Scan Info Tech</span>
      </div>

      <!-- Glass Card -->
      <div class="bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl shadow-2xl p-8">

        <p class="text-xs font-bold tracking-widest text-[#c17f24] uppercase mb-2">Welcome Back</p>
        <h1 class="font-serif text-3xl text-white mb-1">Sign In</h1>
        <p class="text-white/50 text-sm mb-6">
          Don't have an account?
          <a href="register.html" class="text-[#c17f24] font-semibold hover:underline">Create one</a>
        </p>

        <!-- Alerts -->
        <div id="login-error"
          class="hidden bg-red-500/20 border border-red-400/30 text-red-200 text-sm rounded-xl px-4 py-3 mb-4"></div>
        <div id="login-success"
          class="hidden bg-green-500/20 border border-green-400/30 text-green-200 text-sm rounded-xl px-4 py-3 mb-4"></div>

        <form id="login-form" class="space-y-4">

          <!-- Email -->
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1">Email Address</label>
            <input id="email" type="email" placeholder="user@example.com"
              class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 text-white placeholder-white/30 text-sm focus:outline-none focus:ring-2 focus:ring-[#c17f24] focus:border-transparent backdrop-blur-sm transition-all"
              required />
          </div>

          <!-- Password -->
          <div>
            <label class="block text-sm font-medium text-white/80 mb-1">Password</label>
            <div class="relative">
              <input id="password" type="password" placeholder="••••••••••••••"
                class="w-full bg-white/10 border border-white/20 rounded-xl px-4 py-3 pr-11 text-white placeholder-white/30 text-sm focus:outline-none focus:ring-2 focus:ring-[#c17f24] focus:border-transparent backdrop-blur-sm transition-all"
                required />
              <button type="button"
                class="toggle-password absolute right-3 top-3.5 text-white/40 hover:text-white/80 transition-colors"
                data-target="password">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
              </button>
            </div>
          </div>

          <!-- Forgot Password -->
          <div class="flex justify-end">
            <a href="forgot-password.html"
              class="text-xs text-[#c17f24] hover:underline font-medium">
              Forgot password?
            </a>
          </div>

          <button id="login-btn" type="submit" data-label="Sign In"
            class="w-full bg-[#c17f24] hover:bg-[#a66d1a] text-white font-semibold py-3.5 rounded-xl transition-all duration-200 text-sm">
            Sign In
          </button>
        </form>

        <div class="mt-6 pt-6 border-t border-white/10 text-center">
          <p class="text-white/30 text-xs mb-3">Don't have an account?</p>
          <a href="register.html"
            class="flex items-center justify-center gap-2 text-white/70 hover:text-[#c17f24] font-medium text-sm transition-colors">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z"/>
            </svg>
            Create An Account
          </a>
        </div>

        <p class="text-center text-xs text-white/20 mt-5">
          Your information is encrypted and secure.
        </p>
      </div>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
